server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/manhattan?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: manhattan
    password: manhattan
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: never

logging:
  level:
    root: INFO
    com.manhattan: DEBUG
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG
